# Docker Compose configuration for CASDC production deployment
# This provides a production-ready setup with external databases and high availability

version: '3.8'

services:
  # Primary CASDC node
  casdc-primary:
    image: casapps/casdc:latest
    container_name: casdc-primary
    hostname: dc1.${DOMAIN:-example.com}
    restart: always
    environment:
      # Core Configuration
      CASDC_DOMAIN: ${DOMAIN:-example.com}
      CASDC_ORGANIZATION: ${ORGANIZATION:-My Organization}
      CASDC_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      CASDC_TIMEZONE: ${TIMEZONE:-UTC}

      # Database Configuration (external PostgreSQL)
      CASDC_DB_TYPE: ${DB_TYPE:-postgres}
      CASDC_DB_HOST: ${DB_HOST:-postgres}
      CASDC_DB_PORT: ${DB_PORT:-5432}
      CASDC_DB_NAME: ${DB_NAME:-casdc}
      CASDC_DB_USER: ${DB_USER:-casdc}
      CASDC_DB_PASSWORD: ${DB_PASSWORD}
      CASDC_DB_SSL_MODE: ${DB_SSL_MODE:-require}

      # Cache Configuration (external Redis/Valkey)
      CASDC_CACHE_TYPE: ${CACHE_TYPE:-redis}
      CASDC_CACHE_HOST: ${CACHE_HOST:-redis}
      CASDC_CACHE_PORT: ${CACHE_PORT:-6379}
      CASDC_CACHE_PASSWORD: ${CACHE_PASSWORD}
      CASDC_CACHE_DB: ${CACHE_DB:-0}

      # Certificate Management
      CASDC_CERT_PROVIDER: ${CERT_PROVIDER:-letsencrypt}
      CASDC_CERT_EMAIL: ${CERT_EMAIL:-certificates@example.com}
      CASDC_DNS_PROVIDER: ${DNS_PROVIDER:-cloudflare}
      CASDC_DNS_API_TOKEN: ${DNS_API_TOKEN}

      # Security Configuration
      CASDC_SECURITY_LEVEL: ${SECURITY_LEVEL:-high}
      CASDC_MFA_REQUIRED: ${MFA_REQUIRED:-true}
      CASDC_SESSION_TIMEOUT: ${SESSION_TIMEOUT:-28800}
      CASDC_PASSWORD_COMPLEXITY: ${PASSWORD_COMPLEXITY:-high}

      # Clustering
      CASDC_CLUSTER_MODE: true
      CASDC_NODE_NAME: primary
      CASDC_NODE_ROLE: primary

      # Production Settings
      CASDC_DEBUG: false
      CASDC_LOG_LEVEL: warn
      CASDC_DEVELOPMENT_MODE: false
      CASDC_API_RATE_LIMIT: 60

    ports:
      - "80:80"
      - "443:443"
      - "25:25"
      - "465:465"
      - "587:587"
      - "993:993"
      - "995:995"
      - "53:53/tcp"
      - "53:53/udp"

    volumes:
      - casdc_data:/var/lib/casdc
      - casdc_config:/etc/casdc
      - casdc_logs:/var/log/casdc
      - casdc_backups:/mnt/backups/casdc
      - casdc_www:/var/www
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

    networks:
      casdc_network:
        ipv4_address: 172.21.0.10

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - NET_BIND_SERVICE

    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1

    healthcheck:
      test: ["CMD", "casdc", "diagnostic"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        compress: "true"

  # Secondary CASDC node for high availability
  casdc-secondary:
    image: casapps/casdc:latest
    container_name: casdc-secondary
    hostname: dc2.${DOMAIN:-example.com}
    restart: always
    environment:
      # Inherit most settings from primary
      CASDC_DOMAIN: ${DOMAIN:-example.com}
      CASDC_ORGANIZATION: ${ORGANIZATION:-My Organization}
      CASDC_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      CASDC_TIMEZONE: ${TIMEZONE:-UTC}

      # Same database configuration (read replica)
      CASDC_DB_TYPE: ${DB_TYPE:-postgres}
      CASDC_DB_HOST: ${DB_HOST_REPLICA:-postgres-replica}
      CASDC_DB_PORT: ${DB_PORT:-5432}
      CASDC_DB_NAME: ${DB_NAME:-casdc}
      CASDC_DB_USER: ${DB_USER:-casdc}
      CASDC_DB_PASSWORD: ${DB_PASSWORD}
      CASDC_DB_SSL_MODE: ${DB_SSL_MODE:-require}

      # Same cache configuration
      CASDC_CACHE_TYPE: ${CACHE_TYPE:-redis}
      CASDC_CACHE_HOST: ${CACHE_HOST:-redis}
      CASDC_CACHE_PORT: ${CACHE_PORT:-6379}
      CASDC_CACHE_PASSWORD: ${CACHE_PASSWORD}
      CASDC_CACHE_DB: ${CACHE_DB:-0}

      # Clustering
      CASDC_CLUSTER_MODE: true
      CASDC_CLUSTER_TOKEN: ${CLUSTER_TOKEN}
      CASDC_CLUSTER_PRIMARY: casdc-primary
      CASDC_NODE_NAME: secondary
      CASDC_NODE_ROLE: secondary

      # Production Settings
      CASDC_DEBUG: false
      CASDC_LOG_LEVEL: warn
      CASDC_DEVELOPMENT_MODE: false

    volumes:
      - casdc_data_secondary:/var/lib/casdc
      - casdc_config_secondary:/etc/casdc
      - casdc_logs_secondary:/var/log/casdc
      - casdc_backups:/mnt/backups/casdc
      - casdc_www_secondary:/var/www
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

    networks:
      casdc_network:
        ipv4_address: 172.21.0.11

    depends_on:
      - casdc-primary

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - NET_BIND_SERVICE

    healthcheck:
      test: ["CMD", "casdc", "diagnostic"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        compress: "true"

  # HAProxy load balancer for high availability
  haproxy:
    image: haproxy:2.9-alpine
    container_name: casdc-haproxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8404:8404"  # Stats page
    volumes:
      - ./configs/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - casdc_config:/etc/casdc:ro
    networks:
      casdc_network:
        ipv4_address: 172.21.0.2
    depends_on:
      - casdc-primary
      - casdc-secondary

  # PostgreSQL primary database
  postgres:
    image: postgres:16
    container_name: casdc-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-casdc}
      POSTGRES_USER: ${DB_USER:-casdc}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      casdc_network:
        ipv4_address: 172.21.0.20
    command: postgres -c config_file=/etc/postgresql/postgresql.conf

  # PostgreSQL replica for read scaling
  postgres-replica:
    image: postgres:16
    container_name: casdc-postgres-replica
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-casdc}
      POSTGRES_USER: ${DB_USER:-casdc}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_MASTER_HOST: postgres
      POSTGRES_MASTER_PORT: 5432
      POSTGRES_REPLICATION_MODE: slave
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    networks:
      casdc_network:
        ipv4_address: 172.21.0.21
    depends_on:
      - postgres

  # Redis cluster for caching and sessions
  redis:
    image: redis:7
    container_name: casdc-redis
    restart: always
    command: >
      redis-server
      --requirepass ${CACHE_PASSWORD}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfilename "redis.aof"
      --dbfilename "redis.rdb"
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    networks:
      casdc_network:
        ipv4_address: 172.21.0.30

  # Redis Sentinel for high availability
  redis-sentinel:
    image: redis:7
    container_name: casdc-redis-sentinel
    restart: always
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./configs/sentinel.conf:/etc/redis/sentinel.conf
      - redis_sentinel_data:/data
    networks:
      casdc_network:
        ipv4_address: 172.21.0.31
    depends_on:
      - redis

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: casdc-prometheus
    restart: always
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9091:9090"
    networks:
      casdc_network:
        ipv4_address: 172.21.0.40

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: casdc-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      casdc_network:
        ipv4_address: 172.21.0.41
    depends_on:
      - prometheus

  # Backup service using restic
  backup:
    image: mazzolino/restic:latest
    container_name: casdc-backup
    restart: always
    environment:
      BACKUP_CRON: "0 2 * * *"
      RESTIC_REPOSITORY: ${BACKUP_REPOSITORY:-/backups}
      RESTIC_PASSWORD: ${BACKUP_PASSWORD}
      RESTIC_BACKUP_SOURCES: /data
      RESTIC_BACKUP_ARGS: --verbose --exclude-file=/exclude.txt
      RESTIC_FORGET_ARGS: --keep-daily 30 --keep-weekly 12 --keep-monthly 12 --keep-yearly 5
      TZ: ${TIMEZONE:-UTC}
    volumes:
      - casdc_data:/data/casdc:ro
      - postgres_data:/data/postgres:ro
      - redis_data:/data/redis:ro
      - ${BACKUP_PATH:-./backups}:/backups
      - ./configs/backup-exclude.txt:/exclude.txt:ro
    networks:
      - casdc_network

networks:
  casdc_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1

volumes:
  # Primary node volumes
  casdc_data:
    driver: local
  casdc_config:
    driver: local
  casdc_logs:
    driver: local
  casdc_backups:
    driver: local
  casdc_www:
    driver: local

  # Secondary node volumes
  casdc_data_secondary:
    driver: local
  casdc_config_secondary:
    driver: local
  casdc_logs_secondary:
    driver: local
  casdc_www_secondary:
    driver: local

  # Database volumes
  postgres_data:
    driver: local
  postgres_replica_data:
    driver: local

  # Cache volumes
  redis_data:
    driver: local
  redis_sentinel_data:
    driver: local

  # Monitoring volumes
  prometheus_data:
    driver: local
  grafana_data:
    driver: local